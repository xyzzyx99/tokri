name: Tokri Windows Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Product version, for example 2026.07.13"
        required: true
        default: "2026.07.13"
        type: string

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-2022

    env:
      TOKRI_VERSION: ${{ inputs.version }}

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Validate version
        shell: pwsh
        run: |
          if ($env:TOKRI_VERSION -notmatch '^\d+(\.\d+){1,3}$') {
            throw "Version must contain 2 to 4 numeric components, for example 2026.07.13."
          }

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.*"
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          cache: true

      - name: Install rcedit
        shell: pwsh
        run: |
          $toolDir = Join-Path $env:RUNNER_TEMP "rcedit"
          New-Item -ItemType Directory -Path $toolDir -Force | Out-Null
          Invoke-WebRequest `
            -Uri "https://github.com/electron/rcedit/releases/download/v2.0.0/rcedit-x64.exe" `
            -OutFile (Join-Path $toolDir "rcedit.exe")
          $toolDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure x64 Release build
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" `
            -A x64
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config Release --parallel
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Deploy Qt runtime
        shell: pwsh
        run: |
          $exe = "build\Release\Tokri.exe"
          $outDir = "dist\Windows"

          if (-not (Test-Path $exe)) {
            throw "Built executable was not found: $exe"
          }

          New-Item -ItemType Directory -Path $outDir -Force | Out-Null

          & windeployqt --release --compiler-runtime --dir $outDir $exe
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          Copy-Item -Path $exe -Destination "$outDir\Tokri.exe" -Force

          & rcedit "$outDir\Tokri.exe" `
            --set-icon "resources\net.surajyadav.Tokri.ico" `
            --set-version-string "ProductName" "Tokri" `
            --set-product-version $env:TOKRI_VERSION
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Set installer version
        shell: pwsh
        run: |
          $scriptPath = "windows-installer-script.iss"
          $script = Get-Content -Path $scriptPath -Raw
          $replacement = '#define AppVer "' + $env:TOKRI_VERSION + '"'
          $updated = $script -replace '(?m)^#define AppVer\s+"[^"]*"\s*$', $replacement

          if ($updated -eq $script) {
            throw "Could not find the AppVer definition in $scriptPath."
          }

          Set-Content -Path $scriptPath -Value $updated -Encoding utf8

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            throw "Inno Setup compiler was not found at: $iscc"
          }

          & $iscc "windows-installer-script.iss"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Create portable ZIP
        shell: pwsh
        run: |
          $zipPath = "dist\Tokri-Windows-x64-$env:TOKRI_VERSION.zip"
          Compress-Archive -Path "dist\Windows\*" -DestinationPath $zipPath -Force

      - name: Verify outputs
        shell: pwsh
        run: |
          $required = @(
            "dist\Windows\Tokri.exe",
            "dist\Tokri-Windows-x64-$env:TOKRI_VERSION.zip",
            "dist\installer\TokriSetup.exe"
          )

          foreach ($path in $required) {
            if (-not (Test-Path $path)) {
              throw "Expected output was not created: $path"
            }
          }

          Get-ChildItem "dist\Windows" -Recurse | Select-Object FullName, Length
          Get-Item "dist\Tokri-Windows-x64-$env:TOKRI_VERSION.zip"
          Get-Item "dist\installer\TokriSetup.exe"

      - name: Upload Windows packages
        uses: actions/upload-artifact@v7
        with:
          name: Tokri-Windows-x64-${{ inputs.version }}
          path: |
            dist/Tokri-Windows-x64-${{ inputs.version }}.zip
            dist/installer/TokriSetup.exe
          if-no-files-found: error
          retention-days: 30
